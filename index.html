<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<button class="boton-magico" onclick="abrirSobre()">

<div id="visorCarta" class="visor" onclick="cerrarVisor()">

<button onclick="salirAdmin()">Salir Admin</button>
</div>

<script src="script.js"></script>
